<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Crédits Clients</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1, h2 {
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #218838;
        }
        .btn-pay {
            background-color: #007bff;
            font-size: 14px;
            padding: 5px 10px;
        }
        .btn-pay:hover {
            background-color: #0069d9;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        table, th, td {
            border: 1px solid #ddd;
        }
        th, td {
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        .error {
            color: red;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Enregistrement de Crédit Client</h1>
    
    <!-- Formulaire d'ajout de crédit -->
    <div class="form-section">
        <div class="form-group">
            <label for="idPiece">Numéro de pièce d'identité (Identifiant unique)</label>
            <input type="text" id="idPiece" placeholder="Ex: 123456789" required>
        </div>
        <div class="form-group">
            <label for="nom">Nom</label>
            <input type="text" id="nom" placeholder="Nom de famille" required>
        </div>
        <div class="form-group">
            <label for="prenom">Prénom</label>
            <input type="text" id="prenom" placeholder="Prénom" required>
        </div>
        <div class="form-group">
            <label for="montant">Montant du crédit pour ces articles (€)</label>
            <input type="number" id="montant" placeholder="Ex: 50.50" step="0.01" required>
        </div>
        <p class="error" id="errorMsg">Veuillez remplir tous les champs correctement.</p>
        <button onclick="ajouterCredit()">Enregistrer / Ajouter le crédit</button>
    </div>

    <hr style="margin: 30px 0;">

    <!-- Liste des clients et de leurs crédits -->
    <h2>Comptes Clients & Régularisation</h2>
    <table id="clientTable">
        <thead>
            <tr>
                <th>N° Pièce</th>
                <th>Nom</th>
                <th>Prénom</th>
                <th>Crédit Total (€)</th>
                <th>Action (Régularisation)</th>
            </tr>
        </thead>
        <tbody>
            <!-- Les données seront injectées ici par JavaScript -->
        </tbody>
    </table>
</div>

<script>
    // Initialisation du tableau des clients depuis le localStorage ou création d'un tableau vide
    let clients = JSON.parse(localStorage.getItem('clientsCaisse')) || [];

    // Afficher les clients au chargement de la page
    afficherClients();

    // Fonction pour ajouter ou mettre à jour un crédit
    function ajouterCredit() {
        const idPiece = document.getElementById('idPiece').value.trim();
        const nom = document.getElementById('nom').value.trim();
        const prenom = document.getElementById('prenom').value.trim();
        const montant = parseFloat(document.getElementById('montant').value);
        const errorMsg = document.getElementById('errorMsg');

        // Validation des champs
        if (!idPiece || !nom || !prenom || isNaN(montant) || montant <= 0) {
            errorMsg.style.display = 'block';
            return;
        }
        errorMsg.style.display = 'none';

        // Vérifier si le client existe déjà via sa pièce d'identité
        let clientExistant = clients.find(c => c.idPiece === idPiece);

        if (clientExistant) {
            // Le client existe : on ajoute le nouveau montant à son crédit actuel
            clientExistant.creditTotal += montant;
            alert(`Crédit ajouté ! Nouveau solde pour ${nom} ${prenom} : ${clientExistant.creditTotal.toFixed(2)} €`);
        } else {
            // Nouveau client : on le crée
            clients.push({
                idPiece: idPiece,
                nom: nom,
                prenom: prenom,
                creditTotal: montant
            });
            alert(`Nouveau dossier client créé pour ${nom} ${prenom}.`);
        }

        // Sauvegarder les données et mettre à jour l'affichage
        sauvegarderEtActualiser();

        // Vider les champs du formulaire
        document.getElementById('idPiece').value = '';
        document.getElementById('nom').value = '';
        document.getElementById('prenom').value = '';
        document.getElementById('montant').value = '';
    }

    // Fonction pour régulariser (rembourser) le crédit
    function regulariserCredit(idPiece) {
        let client = clients.find(c => c.idPiece === idPiece);
        if (!client) return;

        let montantRembourse = prompt(`Montant remboursé par ${client.nom} ${client.prenom} (Crédit actuel: ${client.creditTotal.toFixed(2)} €) :`);
        
        montantRembourse = parseFloat(montantRembourse);

        if (isNaN(montantRembourse) || montantRembourse <= 0) {
            alert("Montant invalide.");
            return;
        }

        if (montantRembourse > client.creditTotal) {
            alert("Le montant remboursé ne peut pas être supérieur au crédit total.");
            return;
        }

        // Déduction du montant
        client.creditTotal -= montantRembourse;

        // Si la dette est à zéro, on peut éventuellement supprimer le client de la liste des débiteurs
        if (client.creditTotal === 0) {
            alert(`Le crédit de ${client.nom} est totalement réglé.`);
            // Optionnel : dé-commenter la ligne ci-dessous pour supprimer le client une fois payé
            // clients = clients.filter(c => c.idPiece !== idPiece); 
        }

        sauvegarderEtActualiser();
    }

    // Fonction pour sauvegarder dans le navigateur et rafraîchir le tableau
    function sauvegarderEtActualiser() {
        localStorage.setItem('clientsCaisse', JSON.stringify(clients));
        afficherClients();
    }

    // Fonction pour générer le tableau HTML avec les données clients
    function afficherClients() {
        const tbody = document.querySelector('#clientTable tbody');
        tbody.innerHTML = ''; // On vide le tableau avant de le recréer

        clients.forEach(client => {
            const tr = document.createElement('tr');
            
            tr.innerHTML = `
                <td>${client.idPiece}</td>
                <td>${client.nom}</td>
                <td>${client.prenom}</td>
                <td style="color: ${client.creditTotal > 0 ? 'red' : 'green'}; font-weight: bold;">
                    ${client.creditTotal.toFixed(2)} €
                </td>
                <td>
                    ${client.creditTotal > 0 
                        ? `<button class="btn-pay" onclick="regulariserCredit('${client.idPiece}')">Régulariser</button>` 
                        : 'Soldé'}
                </td>
            `;
            tbody.appendChild(tr);
        });
    }
</script>

</body>
</html>
